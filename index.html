<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Heart Animation for Mobile</title>
    <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            background: black;
            overflow: hidden;
            font-family: 'Prompt', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            cursor: pointer;
            touch-action: manipulation;
        }
        canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        #ui-layer {
            position: absolute;
            bottom: 15%;
            text-align: center;
            width: 100%;
            pointer-events: none;
        }
        .instruction {
            font-size: clamp(16px, 4vw, 22px);
            color: #ffb3c1;
            animation: fade 2s infinite;
        }
        @keyframes fade {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>

<canvas id="heart"></canvas>

<div id="ui-layer">
    <p id="status-text" class="instruction">แตะหน้าจอเพื่อเล่นเพลง</p>
</div>

<audio id="bgMusic" src="song.mp3" loop></audio>

<script>
const canvas = document.getElementById("heart");
const ctx = canvas.getContext("2d");
const music = document.getElementById("bgMusic");
const uiLayer = document.getElementById("ui-layer");

function resize() {
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;
}
window.addEventListener('resize', resize);
resize();

let t = 0;

function heartFunction(t) {
    let x = 16 * Math.pow(Math.sin(t), 3);
    let y = -(13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t));
    return {x, y};
}

function draw() {
    ctx.fillStyle = "black";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    ctx.fillStyle = "#ff8fa3";
    ctx.font = "bold 16px Arial";
    ctx.textAlign = "center";
    ctx.textBaseline = "middle";

    // ✅ ปรับ scale ให้เล็กลง (ไม่ล้นจอ)
    let scale = Math.min(canvas.width / 60, canvas.height / 70);

    for (let i = 0; i < 60; i++) {
        let angle = t + i * 0.2;
        let pos = heartFunction(angle);

        let x = canvas.width / 2 + pos.x * scale;
        let y = canvas.height / 2 + pos.y * scale; // ✅ อยู่กลางจอพอดี

        ctx.fillText("เค้ารักซันน♡", x, y);
    }

    t += 0.005;
    requestAnimationFrame(draw);
}

const playMusic = () => {
    music.play().then(() => {
        uiLayer.style.display = "none";
    }).catch(() => {
        uiLayer.style.display = "none";
    });
};

window.addEventListener('click', playMusic);
window.addEventListener('touchstart', playMusic);

draw();
</script>

</body>
</html>
